<!DOCTYPE html>
<html>
<head>
    <title>Water Offset Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* Pop-up Styling to match your requirements */
        .leaflet-popup-content {
            font-size: 14px;
            line-height: 1.6;
            min-width: 200px;
        }
        .popup-title {
            font-weight: bold;
            color: #2e7d32;
            font-size: 16px;
            display: block;
            margin-bottom: 5px;
        }
        .popup-watershed {
            font-style: italic;
            color: #64748b;
            margin-bottom: 8px;
            display: block;
        }
        .popup-meta {
            margin-top: 5px;
            border-top: 1px solid #eee;
            padding-top: 5px;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 60px;
            z-index: 1000;
            background: white;
            padding: 10px 15px;
            border-radius: 4px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">← Back to Dashboard</a>
<div id="map"></div>

<script>
    const map = L.map('map').setView([38.5, -78.0], 7); // Default view over Virginia area

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    async function loadMapData() {
        try {
            const response = await fetch('wateroffsets.csv');
            const text = await response.text();
            const lines = text.trim().split(/\r?\n/);
            const headers = parseLine(lines[0]);
            
            // Map to objects and group by Project/Location to sum Gallons
            const projects = {};

            lines.slice(1).forEach(line => {
                const row = parseLine(line);
                if (row.length < 9) return;

                const projectName = row[headers.indexOf('Project')];
                const company = row[headers.indexOf('Company')];
                const watershed = row[headers.indexOf('Watershed')];
                const category = row[headers.indexOf('Category')];
                const gallons = parseFloat(row[headers.indexOf('Gallons')].replace(/,/g, '')) || 0;
                const lat = parseFloat(row[headers.indexOf('X')]);
                const lng = parseFloat(row[headers.indexOf('Y')]);

                const key = `${projectName}_${lat}_${lng}`;

                if (!projects[key]) {
                    projects[key] = {
                        name: projectName,
                        company: company,
                        watershed: watershed,
                        category: category,
                        lat: lat,
                        lng: lng,
                        totalBenefit: 0
                    };
                }
                projects[key].totalBenefit += gallons;
            });

            // Add markers to map
            Object.values(projects).forEach(p => {
                if (isNaN(p.lat) || isNaN(p.lng)) return;

                const marker = L.marker([p.lat, p.lng]).addTo(map);
                
                const popupContent = `
                    <div class="popup-title">${p.name}</div>
                    <div class="popup-watershed">${p.watershed}</div>
                    <div class="popup-meta">
                        by <b>${p.company}</b><br>
                        Type: <b>${p.category}</b><br>
                        Benefit: <b>${Math.round(p.totalBenefit).toLocaleString()} gal</b>
                    </div>
                `;
                
                marker.bindPopup(popupContent);
            });

        } catch (e) {
            console.error("Error loading map data:", e);
        }
    }

    // CSV line parser to handle quotes/commas correctly
    function parseLine(line) {
        const row = [];
        let current = '', inQuotes = false;
        for (let char of line) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) {
                row.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        row.push(current.trim());
        return row;
    }

    loadMapData();
</script>

</body>
</html>
