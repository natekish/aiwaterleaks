<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXY7BHERXJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NXY7BHERXJ');
    </script>

    <meta charset="UTF-8">
    <title>Data Center Water Usage Summary</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        #map { height: 100vh; width: 100%; position: relative; background: #0b1622; }
        
        .click-through { pointer-events: none !important; }
        .luminous-rivers { filter: hue-rotate(155deg) brightness(1.8) saturate(3); }
        .huc8-label { 
            background: rgba(255,255,255,0.85); border: 1px solid #8b5cf6; 
            padding: 2px 4px; font-size: 10px; font-weight: bold; color: #4c1d95;
            pointer-events: none; 
        }

        .dark-red-marker { filter: hue-rotate(0deg) brightness(0.4) saturate(2.5); }
        .leaflet-control-layers { width: 280px !important; font-size: 14px !important; padding: 12px !important; }
        
        .utility-header { color: #1e40af; font-weight: bold; font-size: 15px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-top: 3px; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. UPDATED SATELLITE LAYER (Google Hybrid: Satellite + Labels)
    var streetMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
    var satelliteHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { 
        attribution: '© Google (Hybrid)',
        maxZoom: 20
    });

    var map = L.map('map', { center: [38.85, -77.45], zoom: 10, layers: [streetMap] });

    // Custom Panes for stacking priority
    map.createPane('backPane');    map.getPane('backPane').style.zIndex = 400; 
    map.createPane('middlePane');  map.getPane('middlePane').style.zIndex = 450; 
    map.createPane('frontPane');   map.getPane('frontPane').style.zIndex = 500; 

    // 2. WATERSHEDS (HUC-08)
    var huc8Layer = L.esri.featureLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/wbd/MapServer/4',
        pane: 'backPane',
        className: 'click-through',
        style: { color: '#8b5cf6', weight: 2, dashArray: '5, 5', fillOpacity: 0.1 }
    }).addTo(map);

    huc8Layer.on('createfeature', function(e) {
        if (e.feature.properties.name) {
            e.feature.layer.bindTooltip(e.feature.properties.name, { permanent: true, direction: 'center', className: 'huc8-label' });
        }
    });

    // 3. RIVERS & GAGES (Luminous Cyan)
    var riversLayer = L.esri.dynamicMapLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer',
        layers: [0, 1, 2, 3, 4, 5, 6, 9], 
        pane: 'middlePane',
        className: 'luminous-rivers'
    }).addTo(map);

    // 4. WATER UTILITIES (Interactive)
    var epaBoundaries = L.esri.featureLayer({
        url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0',
        pane: 'frontPane',
        style: { color: '#00d4ff', weight: 2.5, fillOpacity: 0.2, fillColor: '#0055ff' }
    }).addTo(map);

    epaBoundaries.bindPopup(function(layer) {
        const p = layer.feature.properties;
        // Robust check for utility name variations
        const uName = p.PWS_NAME || p.PWS_Name || p.pws_name || p.NAME || "Public Utility";
        const pop = p.Population_Served_Count || p.Population_Served || 0;
        
        return `
            <div style="min-width: 200px;">
                <div class="utility-header">${uName}</div>
                <small style="color: #666;">Water Utility Boundary</small>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 8px 0;">
                <div class="stat-row"><span>Pop. Served:</span><strong>${pop.toLocaleString()}</strong></div>
                <div class="stat-row"><span>Est. Daily Need:</span><strong>${(pop * 100).toLocaleString()} gal</strong></div>
            </div>`;
    });

    // 5. DATA CENTER PINS
    async function loadMapData() {
        const dcIcon = new L.Icon({ 
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', 
            iconSize: [25, 41], iconAnchor: [12, 41], className: 'dark-red-marker' 
        });
        
        try {
            const response = await fetch('wateruse_agg.geojson');
            const data = await response.json();
            L.geoJSON(data, {
                pane: 'frontPane',
                pointToLayer: (f, latlng) => L.marker(latlng, { icon: dcIcon }),
                onEachFeature: (f, layer) => {
                    layer.bindPopup(`<strong>${f.properties.Location}</strong><br>${f.properties.Company}<hr>Total Usage: ${f.properties.TotalGallons} gal`);
                }
            }).addTo(map);
        } catch (e) { console.error("Error loading geojson", e); }
    }

    // LAYER CONTROL
    L.control.layers(
        { "Street Map": streetMap, "Satellite with Labels": satelliteHybrid }, 
        { 
            "Water Utilities": epaBoundaries, 
            "Rivers & Gages": riversLayer, 
            "Watersheds (HUC-8)": huc8Layer 
        }, 
        { collapsed: false }
    ).addTo(map);

    loadMapData();
</script>
</body>
</html>
