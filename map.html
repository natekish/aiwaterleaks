<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Center Water Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial}
#map{height:100vh;width:100%}
.toolbar{
position:absolute;
top:15px;
left:15px;
z-index:1000;
background:white;
padding:10px 14px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
button{padding:8px 12px;margin-right:8px;cursor:pointer;}
</style>
</head>

<body>

<div class="toolbar">
<button onclick="window.location='wateruse.geojson'">Download Data</button>
</div>

<div id="map"></div>

<script>

let map = L.map('map').setView([38.85,-77.35],9)

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19,
attribution:'© OpenStreetMap'
}).addTo(map)

async function load(){

const res = await fetch("./wateruse.geojson")
const geo = await res.json()

const layer = L.geoJSON(geo,{

onEachFeature:function(feature,layer){

let p = feature.properties

let popup = "<b>"+p.location+"</b><br><br>"

for(const y in p.years){
popup += y + ": " + Number(p.years[y]).toLocaleString() + " gallons<br>"
}

layer.bindPopup(popup)

}

}).addTo(map)

map.fitBounds(layer.getBounds())

}

load()

</script>

</body>
</html>
