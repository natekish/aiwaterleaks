<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXY7BHERXJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NXY7BHERXJ');
    </script>

    <meta charset="UTF-8">
    <title>Water Impact & Restoration Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #0b1622; }
        #search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 300px; }
        .leaflet-control-geocoder { box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-radius: 8px; border: none; width: 100%; }
        .stat-row { display: flex; justify-content: space-between; margin-top: 3px; font-size: 12px; }
        .stat-row span { color: #64748b; font-weight: 500; }
        .project-header { font-weight: bold; color: #10b981; margin-bottom: 5px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .leaflet-control-layers { background: rgba(15, 23, 42, 0.9) !important; color: #fff !important; border-radius: 12px !important; padding: 10px !important; }
    </style>
</head>
<body>

<div id="search-container"></div>
<div id="map"></div>

<script>
    var map = L.map('map', { center: [38.9, -77.45], zoom: 10 });

    var streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var satelliteHybrid = L.esri.basemapLayer('ImageryHybrid');

    var dcMarkers = L.layerGroup().addTo(map);
    var offsetMarkers = L.layerGroup().addTo(map);

    // EPA Water Service Boundaries
    var epaBoundaries = L.esri.featureLayer({
        url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/SDWIS_Service_Areas_Public_View/FeatureServer/0',
        style: { color: '#3b82f6', weight: 1, fillOpacity: 0.1 }
    }).addTo(map);

    var geocoder = L.Control.geocoder({ defaultMarkGeocode: false })
        .on('markgeocode', function(e) { map.fitBounds(e.geocode.bbox); })
        .addTo(map);
    document.getElementById('search-container').appendChild(geocoder.getContainer());

    // Robust CSV Parser
    function parseCSV(text) {
        const lines = text.trim().split(/\r?\n/);
        return lines.map(line => {
            const values = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else current += char;
            }
            values.push(current.trim());
            return values;
        });
    }

    async function loadMapData() {
        const dcIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        const offsetIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        
        // 1. Load wateruse.csv
        try {
            const res = await fetch('wateruse.csv');
            const text = await res.text();
            const rows = parseCSV(text);
            const headers = rows[0];

            // Get indices dynamically
            const iX = headers.indexOf('X');
            const iY = headers.indexOf('Y');
            const iGal = headers.indexOf('Gallons');
            const iLoc = headers.indexOf('Location');
            const iDate = headers.indexOf('Date');
            const iComp = headers.indexOf('Company');

            const clusters = {};

            rows.slice(1).forEach(row => {
                const lat = parseFloat(row[iX]);
                const lng = parseFloat(row[iY]);
                if (isNaN(lat) || isNaN(lng)) return;

                const key = `${lat.toFixed(5)}|${lng.toFixed(5)}`;
                const gallons = parseFloat(row[iGal]) || 0;
                const year = row[iDate] ? (row[iDate].match(/\d{4}/) || ["Unknown"])[0] : "Unknown";

                if (!clusters[key]) {
                    clusters[key] = { lat, lng, loc: row[iLoc], comp: row[iComp], total: 0, years: {} };
                }
                clusters[key].total += gallons;
                clusters[key].years[year] = (clusters[key].years[year] || 0) + gallons;
            });

            Object.values(clusters).forEach(c => {
                let yearlyList = Object.entries(c.years)
                    .sort((a,b) => b[0] - a[0])
                    .map(([y, v]) => `<div class="stat-row"><span>${y}</span> <strong>${Math.round(v).toLocaleString()} gal</strong></div>`)
                    .join('');

                L.marker([c.lat, c.lng], { icon: dcIcon })
                    .bindPopup(`
                        <div style="min-width:180px">
                            <strong style="font-size:13px">${c.loc}</strong><br>
                            <span style="color:#64748b; font-size:11px">${c.comp}</span><hr style="margin:8px 0; border:0; border-top:1px solid #eee">
                            ${yearlyList}
                            <div class="stat-row" style="margin-top:8px; border-top:1px solid #eee; padding-top:4px; font-weight:bold;">
                                <span>TOTAL</span> ${Math.round(c.total).toLocaleString()} gal
                            </div>
                        </div>
                    `).addTo(dcMarkers);
            });
        } catch (e) { console.error("Error loading usage:", e); }

        // 2. Load wateroffsets.csv
        try {
            const res = await fetch('wateroffsets.csv');
            const text = await res.text();
            const rows = parseCSV(text);
            const headers = rows[0];

            const iX = headers.indexOf('X');
            const iY = headers.indexOf('Y');
            const iProj = headers.indexOf('Project Name');
            const iComp = headers.indexOf('Company');
            const iGal = headers.indexOf('Gallons');

            rows.slice(1).forEach(row => {
                const lat = parseFloat(row[iX]);
                const lng = parseFloat(row[iY]);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const gal = row[iGal] ? parseInt(row[iGal].replace(/,/g, '')).toLocaleString() : '0';
                    L.marker([lat, lng], { icon: offsetIcon })
                        .bindPopup(`
                            <div class="project-header">Restoration Project</div>
                            <strong>${row[iProj]}</strong><br>
                            <span style="color:#64748b">${row[iComp]}</span><hr>
                            <div class="stat-row" style="color:#10b981;"><span>Benefit:</span><strong>${gal} gal</strong></div>
                        `).addTo(offsetMarkers);
                }
            });
        } catch (e) { console.error("Error loading offsets:", e); }
    }

    var baseLayers = { "Satellite": satelliteHybrid, "Street": streetMap };
    var overlays = { "Data Centers (Usage)": dcMarkers, "Water Projects": offsetMarkers, "Service Areas": epaBoundaries };

    L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);
    loadMapData();
</script>
</body>
</html>
