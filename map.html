<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXY7BHERXJ"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){gtag('js',new Date());}gtag('config','G-NXY7BHERXJ');</script>
    <meta charset="UTF-8"><title>Water Impact Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body{margin:0;font-family:sans-serif}#map{height:100vh;width:100%;background:#0b1622}
        .leaflet-popup-content{width:320px!important}.owner-header{color:#b91c1c;font-size:15px;font-weight:800;text-transform:uppercase}
        .site-name{font-size:13px;font-weight:600;border-bottom:1px solid #eee;margin-bottom:5px}
        .stat-row{display:flex;justify-content:space-between;font-size:11px;margin-top:2px}
        .analysis-box{background:#f8fafc;padding:8px;border-radius:5px;margin-top:8px;border:1px solid #e2e8f0}
        .risk-list{font-size:10px;padding-left:0;list-style:none;margin:3px 0;color:#b91c1c}
        .balance-row{border-top:1px solid #333;margin-top:5px;font-weight:bold;font-size:12px}
        .status-deficit{color:#ef4444}.status-surplus{color:#10b981}
        #search-container{position:absolute;top:15px;left:50%;transform:translateX(-50%);z-index:1000;width:350px}
        .back-btn{position:absolute;top:15px;left:15px;z-index:1001;background:#fff;padding:5px 10px;border-radius:5px;text-decoration:none;color:#333;font-size:12px;border:1px solid #ccc}
    </style>
</head>
<body>
<a href="index.html" class="back-btn">← Dashboard</a><div id="search-container"></div><div id="map"></div>
<script>
    const sat = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{maxZoom:20});
    const map = L.map('map',{center:[38.85,-77.45],zoom:11,layers:[sat],zoomControl:false});
    L.control.zoom({position:'bottomright'}).addTo(map);
    const geo = L.Control.geocoder({defaultMarkGeocode:false,collapsed:false}).on('markgeocode',e=>map.fitBounds(e.geocode.bbox)).addTo(map);
    document.getElementById('search-container').appendChild(geo.getContainer());

    map.createPane('back').style.zIndex=400; map.createPane('front').style.zIndex=500;
    const dcM=L.layerGroup().addTo(map), offM=L.layerGroup().addTo(map);
    window.globalDC={}; window.globalProj={};

    const huc8 = L.esri.featureLayer({url:'https://hydro.nationalmap.gov/arcgis/rest/services/wbd/MapServer/4',pane:'back',style:{color:'#ff0000',weight:1,fillOpacity:0.1}}).addTo(map);
    const epa = L.esri.featureLayer({url:'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0',pane:'front',style:{color:'#00d4ff',weight:2,fillOpacity:0.1}});
    const recycled = L.esri.featureLayer({url:'https://services1.arcgis.com/MxjRokvPm7bjslyR/arcgis/rest/services/Reclaimed_Water_Pipe_Line/FeatureServer/0',pane:'front',style:{color:'#9333ea',weight:3}}).addTo(map);

    epa.bindPopup(l => `<strong>Utility:</strong> ${l.feature.properties.NAME||"Private"}`);
    huc8.bindPopup(l => {
        let u=0, b=0, p=l.feature;
        Object.values(window.globalDC).forEach(d=>{if(turf.booleanPointInPolygon(turf.point([d.lng,d.lat]),p))u+=d.total});
        Object.values(window.globalProj).forEach(o=>{if(turf.booleanPointInPolygon(turf.point([o.lng,o.lat]),p))b+=o.total});
        let bal=b-u; return `<b>${p.properties.name}</b><br>Net: ${bal.toLocaleString()} gal`;
    });

    function parse(t){ return t.trim().split('\n').map(r=>{let pts=[],cur='',q=false;for(let c of r){if(c==='"'&&!q)q=true;else if(c==='"'&&q)q=false;else if(c===','&&!q){pts.push(cur.trim());cur=''}else cur+=c}pts.push(cur.trim());return pts;});}

    async function load(){
        try{
            const r=await fetch('wateruse.csv'), d=parse(await r.text()), h=d[0].map(v=>v.toLowerCase());
            const f=ns=>ns.map(n=>h.indexOf(n)).find(i=>i!==-1);
            const idx={co:f(['company']),loc:f(['location','site']),x:f(['lat','x']),y:f(['long','y']),gal:f(['gallons']),yr:f(['year']),ut:f(['utility'])};
            d.slice(1).forEach(row=>{
                let lt=parseFloat(row[idx.x]),ln=parseFloat(row[idx.y]);if(isNaN(lt))return;
                let k=row[idx.loc]+lt;if(!window.globalDC[k])window.globalDC[k]={n:row[idx.loc],co:row[idx.co],lat:lt,lng:ln,ut:row[idx.ut],y:{},total:0};
                let yr=(row[idx.yr]?.match(/\d{4}/)||['Total'])[0], v=parseInt(row[idx.gal]?.replace(/,/g,''))||0;
                window.globalDC[k].y[yr]=(window.globalDC[k].y[yr]||0)+v; window.globalDC[k].total+=v;
            });
            Object.values(window.globalDC).forEach(o=>{
                let id=o.lat.toString().replace(/\D/g,''), yrs='';
                Object.keys(o.y).sort((a,b)=>b-a).forEach(yr=>yrs+=`<div class="stat-row"><span>${yr}:</span><strong>${o.y[yr].toLocaleString()}</strong></div>`);
                let html=`<div class="owner-header">${o.co}</div><div class="site-name">${o.n}</div><div class="analysis-box"><div class="stat-row"><span>Utility:</span><strong id="ut${id}">${o.ut||'...'}</strong></div><div class="stat-row"><span>Basin:</span><strong id="ba${id}">...</strong></div><ul class="risk-list" id="ri${id}"></ul></div>${yrs}<div class="balance-row">Total: ${o.total.toLocaleString()} gal</div>`;
                L.marker([o.lat,o.lng],{icon:new L.Icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',iconSize:[20,32]})}).bindPopup(html).addTo(dcM).on('popupopen',()=>analyze(o,id));
            });
        }catch(e){console.error(e)}

        try{
            const r2=await fetch('wateroffsets.csv'), d2=parse(await r2.text()), h2=d2[0].map(v=>v.toLowerCase());
            const idx2={prj:h2.indexOf('project'),x:h2.indexOf('lat'),y:h2.indexOf('long'),gal:h2.indexOf('gallons')};
            d2.slice(1).forEach(row=>{
                let lt=parseFloat(row[idx2.x]),ln=parseFloat(row[idx2.y]),v=parseInt(row[idx2.gal]?.replace(/,/g,''))||0;
                if(!window.globalProj[row[idx2.prj]])window.globalProj[row[idx2.prj]]={lat:lt,lng:ln,total:0};
                window.globalProj[row[idx2.prj]].total+=v;
                L.marker([lt,ln],{icon:new L.Icon({iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',iconSize:[20,32]})}).bindPopup(`<b>${row[idx2.prj]}</b>`).addTo(offM);
            });
        }catch(e){}
    }

    function analyze(o,id){
        let p=turf.point([o.lng,o.lat]);
        if(!o.ut)L.esri.query({url:'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0'}).intersects(p).run((e,f)=>{if(f?.features[0])document.getElementById('ut'+id).innerText=f.features[0].properties.NAME});
        L.esri.query({url:'https://hydro.nationalmap.gov/arcgis/rest/services/wbd/MapServer/4'}).intersects(p).run((e,f)=>{if(f?.features[0])document.getElementById('ba'+id).innerText=f.features[0].properties.name});
        L.esri.query({url:'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer/6'}).intersects(turf.buffer(p,2,{units:'miles'})).run((e,f)=>{
            let r=''; f?.features?.forEach(i=>{if(i.properties.gnis_name)r+=`<li>⚠️ River: ${i.properties.gnis_name}</li>`});
            document.getElementById('ri'+id).innerHTML=r||'No nearby risks';
        });
    }

    L.control.layers({"Satellite":sat},{"Data Centers":dcM,"Restoration":offM,"Recycled Water":recycled,"Utilities":epa,"Basins":huc8},{collapsed:false}).addTo(map);
    load();
</script>
</body>
</html>
