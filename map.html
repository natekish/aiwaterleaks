<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Center Water Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; width: 100%; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// 1. Initialize map centered on your Northern Virginia data
// Note: Leaflet uses [Lat, Lng]
let map = L.map('map').setView([38.82, -77.65], 11);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
}).addTo(map);

async function load() {
    try {
        // 2. Fetch the GeoJSON file
        const res = await fetch("./wateruse.geojson");
        const geo = await res.json();

        L.geoJSON(geo, {
            onEachFeature: function(feature, layer) {
                let p = feature.properties;
                // 3. Match keys exactly: Location, Company, Utility, etc.
                let popup = `
                    <b>Location:</b> ${p.Location}<br>
                    <b>Company:</b> ${p.Company}<br>
                    <b>Utility:</b> ${p.Utility}<br>
                    <b>Date:</b> ${p.Date}<br>
                    <b>Gallons:</b> ${p.Gallons.toLocaleString()}
                `;
                layer.bindPopup(popup);
            }
        }).addTo(map);
    } catch (err) {
        console.error("Error loading GeoJSON. Make sure you are using a local server!", err);
    }
}

load();
</script>
</body>
</html>
