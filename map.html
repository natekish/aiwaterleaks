<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Center Water Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; width: 100%; }
    
    /* Styling for the toolbar you requested */
    .toolbar {
        position: absolute;
        top: 15px;
        left: 50px; /* Shifted slightly to the right to clear Leaflet zoom buttons */
        z-index: 1000;
        background: white;
        padding: 10px;
        border-radius: 6px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    
    .toolbar button {
        padding: 8px 12px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: default; /* Changed to default since it's an instructional label */
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="toolbar">
    <button>To view annual water use click pins</button>
</div>

<div id="map"></div>

<script>
// Initialize map centered on Northern Virginia
let map = L.map('map').setView([38.82, -77.65], 11);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
}).addTo(map);

async function load() {
    try {
        const res = await fetch("./wateruse.geojson");
        const geo = await res.json();

        L.geoJSON(geo, {
            onEachFeature: function(feature, layer) {
                let p = feature.properties;
                // Popup uses the exact keys from your GeoJSON
                let popup = `
                    <b>Location:</b> ${p.Location}<br>
                    <b>Company:</b> ${p.Company}<br>
                    <b>Utility:</b> ${p.Utility}<br>
                    <b>Date:</b> ${p.Date.substring(0, 10)}<br>
                    <b>Gallons:</b> ${p.Gallons.toLocaleString()}
                `;
                layer.bindPopup(popup);
            }
        }).addTo(map);
    } catch (err) {
        console.error("Error loading GeoJSON:", err);
    }
}

load();
</script>

</body>
</html>
