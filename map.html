<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXY7BHERXJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NXY7BHERXJ');
    </script>

    <meta charset="UTF-8">
    <title>Water Impact Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #0b1622; }
        
        /* 1. TOP CENTER SEARCH BAR STYLING */
        #search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 400px;
            max-width: 90%;
        }

        /* Make the geocoder always expanded and centered */
        .leaflet-control-geocoder {
            width: 100% !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
            border-radius: 8px !important;
            background: white;
            border: 2px solid #1e40af !important;
        }

        .leaflet-control-geocoder-form input {
            width: 100% !important;
            padding: 12px !important;
            font-size: 16px !important;
            border: none !important;
            outline: none !important;
        }

        /* Style the type-ahead dropdown */
        .leaflet-control-geocoder-results {
            border-radius: 0 0 8px 8px;
            border-top: 1px solid #eee;
        }

        /* 2. Map Elements */
        .luminous-rivers { filter: hue-rotate(155deg) brightness(1.8) saturate(3); pointer-events: none; }
        .dark-red-marker { filter: hue-rotate(0deg) brightness(0.4) saturate(2.5); }
        .leaflet-control-layers { width: 280px !important; font-size: 14px !important; padding: 12px !important; }
        .stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-top: 3px; border-bottom: 1px solid #f9f9f9; padding-bottom: 2px; }
    </style>
</head>
<body>

<div id="search-container"></div>

<div id="map"></div>

<script>
    var streetMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
    var satelliteHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { 
        attribution: '© Google (Hybrid)',
        maxZoom: 20
    });

    var map = L.map('map', { 
        center: [38.85, -77.45], 
        zoom: 11, 
        layers: [satelliteHybrid],
        zoomControl: false // Moved to bottom-right to clear the top area
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // 3. INITIALIZE SEARCH WITH TYPE-AHEAD
    var geocoder = L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Search address or location...",
        collapsed: false, // Keep it open
        suggestMinLength: 3 // Start showing suggestions after 3 letters
    })
    .on('markgeocode', function(e) {
        var bbox = e.geocode.bbox;
        map.fitBounds(bbox);
        L.marker(e.geocode.center).addTo(map)
            .bindPopup(e.geocode.name).openPopup();
    })
    .addTo(map);

    // Manually move the geocoder into our top-center container
    document.getElementById('search-container').appendChild(geocoder.getContainer());

    // 4. MAP LAYERS
    map.createPane('backPane');    map.getPane('backPane').style.zIndex = 400; 
    map.createPane('middlePane');  map.getPane('middlePane').style.zIndex = 450; 
    map.createPane('frontPane');   map.getPane('frontPane').style.zIndex = 500; 

    var huc8Layer = L.esri.featureLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/wbd/MapServer/4',
        pane: 'backPane',
        style: { color: '#8b5cf6', weight: 2, dashArray: '8, 4', fillOpacity: 0.1 }
    }).addTo(map);

    var riversLayer = L.esri.dynamicMapLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer',
        layers: [0, 1, 2, 3, 4, 5, 6, 9], 
        pane: 'middlePane',
        className: 'luminous-rivers'
    }).addTo(map);

    var epaBoundaries = L.esri.featureLayer({
        url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0',
        pane: 'frontPane',
        style: { color: '#00d4ff', weight: 2.5, fillOpacity: 0.2, fillColor: '#0055ff' }
    }).addTo(map);

    async function loadMapData() {
        const dcIcon = new L.Icon({ 
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', 
            iconSize: [25, 41], iconAnchor: [12, 41], className: 'dark-red-marker' 
        });
        
        try {
            const response = await fetch('wateruse_agg.geojson');
            const data = await response.json();
            L.geoJSON(data, {
                pane: 'frontPane',
                pointToLayer: (f, latlng) => L.marker(latlng, { icon: dcIcon }),
                onEachFeature: (f, layer) => {
                    const props = f.properties;
                    let popupContent = `<strong>${props.Location}</strong><hr>`;
                    if (props.YearlyTotals) popupContent += `<div>${props.YearlyTotals}</div>`;
                    layer.bindPopup(popupContent);
                }
            }).addTo(map);
        } catch (e) { console.error("GeoJSON failed:", e); }
    }

    L.control.layers(
        { "Satellite": satelliteHybrid, "Street": streetMap }, 
        { "Utilities": epaBoundaries, "Rivers": riversLayer, "Watersheds": huc8Layer }, 
        { collapsed: false }
    ).addTo(map);

    loadMapData();
</script>
</body>
</html>
