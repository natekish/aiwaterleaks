<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Data Center Water Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }
        #map { height: 100vh; width: 100%; }
        .toolbar {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 10px 14px; border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

<div class="toolbar">
    <strong>Data Center Water Usage</strong>
</div>

<div id="map"></div>

<script>
    // Center map on Northern Virginia area
    let map = L.map('map').setView([38.85, -77.45], 10);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    async function load() {
        try {
            // Loading the local geojson file
            const res = await fetch("./wateruse.geojson");
            const geo = await res.json();

            L.geoJSON(geo, {
                onEachFeature: function(feature, layer) {
                    let p = feature.properties;
                    // Updated to match your GeoJSON's specific property names
                    let popup = `
                        <b>Location:</b> ${p.Location}<br>
                        <b>Company:</b> ${p.Company}<br>
                        <b>Utility:</b> ${p.Utility}<br>
                        <b>Date:</b> ${p.Date}<br>
                        <b>Gallons:</b> ${p.Gallons.toLocaleString()}
                    `;
                    layer.bindPopup(popup);
                }
            }).addTo(map);
        } catch (err) {
            console.error("Error loading GeoJSON. Note: This fetch will fail if opened directly via file://. Use a local server.");
        }
    }

    load();
</script>
</body>
</html>
