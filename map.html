<html>
<head>

    <meta charset="UTF-8">
    <title>Data Center Water Usage Summary</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }

        /* Styling for the toolbar you requested */
    .toolbar {
        position: absolute;
        top: 15px;
        left: 50px; /* Shifted slightly to the right to clear Leaflet zoom buttons */
        z-index: 1000;
        background: white;
        padding: 10px;
        border-radius: 6px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    
    .toolbar button {
        padding: 8px 12px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: default; /* Changed to default since it's an instructional label */
        font-weight: bold;
    }
        .leaflet-popup-content { font-size: 14px; line-height: 1.5; }
        .total-row { border-top: 1px solid #ccc; margin-top: 5px; padding-top: 5px; font-weight: bold; }
    
    </style>
</head>
<body>

<div class="toolbar">
    <button>To view annual water use click pins</button>
</div>

<div id="map"></div>

<script>
    // Initialize map centered on the Northern Virginia data cluster
    var map = L.map('map').setView([38.85, -77.45], 11);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    async function loadMapData() {
        try {
            // Loading the aggregated GeoJSON
            const response = await fetch('wateruse_agg.geojson');
            const data = await response.json();

            L.geoJSON(data, {
                onEachFeature: function (feature, layer) {
                    const p = feature.properties;
                    
                    // Create the popup content with yearly breakdown
                    const popupContent = `
                        <strong>${p.Location}</strong><br>
                        <small>${p.Company} | ${p.Utility}</small><hr>
                        <strong>Yearly Totals:</strong><br>
                        ${p.YearlyTotals}
                        <div class="total-row">All-time Total: ${p.TotalGallons} gal</div>
                    `;
                    
                    layer.bindPopup(popupContent);
                }
            }).addTo(map);
        } catch (error) {
            console.error('Error loading the map data:', error);
            alert("To view the map, please run this folder using a local web server (e.g., Live Server in VS Code).");
        }
    }

    loadMapData();
</script>

</body>
</html>
