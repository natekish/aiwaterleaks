<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXY7BHERXJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NXY7BHERXJ');
    </script>

    <meta charset="UTF-8">
    <title>Data Center Water Usage Summary</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.11.0/dist/geosearch.css"/>
    <script src="https://unpkg.com/leaflet-geosearch@3.11.0/dist/bundle.min.js"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .leaflet-geosearch-button { margin-left: 10px !important; margin-top: 10px !important; }
        
        /* Marker & Layer Styling */
        .dark-red-marker { filter: hue-rotate(0deg) brightness(0.4) saturate(2); }
        
        /* Teal Filter for Rivers & Streams */
        .teal-rivers { filter: hue-rotate(140deg) brightness(1.2) saturate(2.5); }

        .huc-label {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #8b5cf6;
            border-radius: 4px;
            padding: 2px 5px;
            font-size: 10px;
            font-weight: bold;
            color: #5b21b6;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    var streetMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' });
    var satelliteMap = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: '© Google Satellite' });

    var map = L.map('map', { center: [38.85, -77.45], zoom: 11, layers: [streetMap] });

    // 1. Address Search (Bright Red Pin)
    const searchControl = new GeoSearch.GeoSearchControl({
        provider: new GeoSearch.OpenStreetMapProvider(),
        style: 'bar', position: 'topleft', showMarker: true,
        marker: {
            icon: new L.Icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41]
            })
        }
    });
    map.addControl(searchControl);

    // 2. Overlays
    
    var epaBoundaries = L.esri.featureLayer({
        url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0',
        style: { color: '#1976d2', weight: 2, fillOpacity: 0.1 }
    }).addTo(map);

    var huc12Layer = L.esri.featureLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/wbd/MapServer/6',
        style: { color: '#8b5cf6', weight: 1.5, dashArray: '5, 5', fillOpacity: 0.05 },
        onEachFeature: function(feature, layer) {
            if (feature.properties && feature.properties.Name) {
                layer.bindTooltip(feature.properties.Name, {
                    permanent: true, direction: 'center', className: 'huc-label'
                });
            }
        }
    });

    // RIVERS & STREAMS (Set to Teal via CSS Class)
    var riversLayer = L.esri.dynamicMapLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer',
        layers: [1, 2, 3, 4, 5, 6, 9], 
        opacity: 0.8,
        className: 'teal-rivers' 
    });

    // WETLANDS (WMS Service for higher reliability)
    var wetlandsLayer = L.tileLayer.wms('https://www.fws.gov/wetlands/arcgis/services/Wetlands/MapServer/WMSServer', {
        layers: '1',
        format: 'image/png',
        transparent: true,
        opacity: 0.6,
        attribution: 'U.S. Fish & Wildlife Service'
    });

    // Layer Controls
    var baseMaps = { "Street Map": streetMap, "Satellite View": satelliteMap };
    var overlayMaps = {
        "Water Utility Service Area": epaBoundaries,
        "HUC-12 Subwatersheds": huc12Layer,
        "Rivers & Streams (Teal)": riversLayer,
        "Wetlands (FWS)": wetlandsLayer
    };
    L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

    // 3. Data Center Pins (Dark Red/Maroon)
    async function loadMapData() {
        const darkRedIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], className: 'dark-red-marker'
        });

        try {
            const response = await fetch('wateruse_agg.geojson');
            const data = await response.json();
            L.geoJSON(data, {
                pointToLayer: (f, l) => L.marker(l, { icon: darkRedIcon }),
                onEachFeature: (f, layer) => {
                    const p = f.properties;
                    layer.bindPopup(`
                        <strong>${p.Location}</strong><br>
                        <small>${p.Company}</small><hr>
                        ${p.YearlyTotals}<br>
                        <strong>Total: ${p.TotalGallons} gal</strong>
                    `);
                }
            }).addTo(map);
        } catch (e) { console.error('GeoJSON Load Error:', e); }
    }
    loadMapData();
</script>
</body>
</html>
