<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXY7BHERXJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NXY7BHERXJ');
    </script>

    <meta charset="UTF-8">
    <title>Water Impact Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #0b1622; }
        
        /* High-Visibility Filters */
        .luminous-rivers { filter: hue-rotate(155deg) brightness(1.8) saturate(3); pointer-events: none; }
        .dark-red-marker { filter: hue-rotate(0deg) brightness(0.4) saturate(2.5); }
        
        /* UI Elements */
        .leaflet-control-layers { width: 280px !important; font-size: 14px !important; padding: 12px !important; }
        
        /* Popup Styling */
        .basin-header { color: #4c1d95; font-weight: bold; border-bottom: 2px solid #8b5cf6; margin-bottom: 5px; }
        .utility-header { color: #1e40af; font-weight: bold; font-size: 15px; }
        .stat-row { display: flex; justify-content: space-between; font-size: 12px; margin-top: 3px; border-bottom: 1px solid #f9f9f9; padding-bottom: 2px; }
        .stat-row strong { margin-left: 10px; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. BASE LAYERS
    var streetMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });
    var satelliteHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { 
        attribution: '© Google (Hybrid)',
        maxZoom: 20
    });

    var map = L.map('map', { center: [38.85, -77.45], zoom: 11, layers: [satelliteHybrid] });

    // Stacking Panes (Order: Bottom to Top)
    map.createPane('backPane');    map.getPane('backPane').style.zIndex = 400; // Watersheds
    map.createPane('middlePane');  map.getPane('middlePane').style.zIndex = 450; // Rivers
    map.createPane('frontPane');   map.getPane('frontPane').style.zIndex = 500; // Utilities/Pins

    // 2. WATERSHEDS (HUC-8)
    var huc8Layer = L.esri.featureLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/wbd/MapServer/4',
        pane: 'backPane',
        style: { color: '#8b5cf6', weight: 2, dashArray: '8, 4', fillOpacity: 0.1 }
    }).addTo(map);

    huc8Layer.bindPopup(layer => {
        const p = layer.feature.properties;
        return `<div class="basin-header">${p.name || "Unknown"} Basin</div><strong>HUC-8:</strong> ${p.huc8}`;
    });

    // 3. RIVERS & GAGES (Luminous Cyan)
    var riversLayer = L.esri.dynamicMapLayer({
        url: 'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer',
        layers: [0, 1, 2, 3, 4, 5, 6, 9], 
        pane: 'middlePane',
        className: 'luminous-rivers'
    }).addTo(map);

    // 4. WATER UTILITIES (With Demand Estimate)
    var epaBoundaries = L.esri.featureLayer({
        url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0',
        pane: 'frontPane',
        style: { color: '#00d4ff', weight: 2.5, fillOpacity: 0.2, fillColor: '#0055ff' }
    }).addTo(map);

    epaBoundaries.bindPopup(layer => {
        const p = layer.feature.properties;
        const uName = p.PWS_NAME || p.PWS_Name || "Public Utility";
        const pop = p.Population_Served_Count || p.Population_Served || 0;
        const dailyEstimate = pop * 100; // Standard 100 gal/day/person

        return `
            <div style="min-width: 220px;">
                <div class="utility-header">${uName}</div>
                <small>Utility Service Boundary</small>
                <hr style="margin: 8px 0; border: 0; border-top: 1px solid #eee;">
                <div class="stat-row"><span>Pop. Served:</span><strong>${pop.toLocaleString()}</strong></div>
                <div class="stat-row"><span>Est. Daily Demand:</span><strong style="color: #1e40af;">${dailyEstimate.toLocaleString()} gal</strong></div>
            </div>`;
    });

    // 5. DATA CENTER PINS (With Yearly Totals)
    async function loadMapData() {
        const dcIcon = new L.Icon({ 
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', 
            iconSize: [25, 41], iconAnchor: [12, 41], className: 'dark-red-marker' 
        });
        
        try {
            const response = await fetch('wateruse_agg.geojson');
            const data = await response.json();
            L.geoJSON(data, {
                pane: 'frontPane',
                pointToLayer: (f, latlng) => L.marker(latlng, { icon: dcIcon }),
                onEachFeature: (f, layer) => {
                    const props = f.properties;
                    let popupContent = `<strong>${props.Location || 'DC Location'}</strong><br>${props.Company || 'Operator'}<hr>`;
                    
                    // Specific years to display if present in GeoJSON
                    const years = ['2020', '2021', '2022', '2023', '2024', '2025'];
                    let foundYear = false;

                    years.forEach(year => {
                        if (props[year]) {
                            const val = parseFloat(props[year]);
                            popupContent += `<div class="stat-row"><span>${year} Usage:</span><strong>${val.toLocaleString()} gal</strong></div>`;
                            foundYear = true;
                        }
                    });

                    if (props.TotalGallons) {
                        const total = parseFloat(props.TotalGallons);
                        popupContent += `<hr><div class="stat-row"><strong>Total Usage:</strong><strong style="color: #991b1b;">${total.toLocaleString()} gal</strong></div>`;
                    } else if (!foundYear) {
                        popupContent += `<div>No usage data available.</div>`;
                    }

                    layer.bindPopup(popupContent);
                }
            }).addTo(map);
        } catch (e) { console.error("GeoJSON load failed:", e); }
    }

    L.control.layers(
        { "Satellite (Hybrid)": satelliteHybrid, "Street Map": streetMap }, 
        { 
            "Water Utilities": epaBoundaries, 
            "Rivers & Gages": riversLayer, 
            "Watersheds (HUC-8)": huc8Layer 
        }, 
        { collapsed: false }
    ).addTo(map);

    loadMapData();
</script>
</body>
</html>
