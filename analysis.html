<!DOCTYPE html>
<html>
<head>
    <title>Data Center Water Analysis</title>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; padding: 40px; color: #1e293b; line-height: 1.5; }
        .report { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .stat-card { background: #f1f5f9; padding: 20px; border-radius: 8px; border-top: 4px solid #1e40af; }
        .label { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: bold; }
        .val { font-size: 20px; font-weight: bold; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .loading { color: #2563eb; font-style: italic; }
    </style>
</head>
<body>
    <div class="report">
        <h1 id="siteName">Analyzing Watershed...</h1>
        <p id="operator" style="font-size: 1.2em; color: #64748b; margin-top: -10px;"></p>

        <div class="grid">
            <div class="stat-card">
                <div class="label">Water Utility</div>
                <div id="utility" class="val loading">Querying EPA...</div>
            </div>
            <div class="stat-card">
                <div class="label">Rivers & Streams (5mi)</div>
                <div id="rivers" class="val loading">Querying USGS...</div>
            </div>
            <div class="stat-card">
                <div class="label">Mapped Wetlands (5mi)</div>
                <div id="wetlands" class="val loading">Querying NWI...</div>
            </div>
        </div>

        <h3>Consumption History</h3>
        <table id="useTable">
            <thead><tr><th>Year</th><th>Usage (Gallons)</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = JSON.parse(decodeURIComponent(params.get('data')));

        document.getElementById('siteName').innerText = data.name;
        document.getElementById('operator').innerText = "Operator: " + data.co;

        // Populate Table
        const years = Object.keys(data.yearly).sort().reverse();
        years.forEach(yr => {
            document.querySelector('#useTable tbody').innerHTML += `<tr><td>${yr}</td><td>${data.yearly[yr].toLocaleString()} gal</td></tr>`;
        });

        // Spatial Analysis (5 Mile Risk Radius)
        const buffer = turf.buffer(turf.point([data.lng, data.lat]), 5, {units: 'miles'});

        // 1. Utility Query (EPA)
        L.esri.query({ url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0' })
            .intersects(buffer).fields(['NAME', 'PWS_NAME']).run((err, fc) => {
                document.getElementById('utility').innerText = fc?.features[0]?.properties?.NAME || "Municipal/Unknown";
                document.getElementById('utility').classList.remove('loading');
            });

        // 2. Rivers Query (USGS)
        L.esri.query({ url: 'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer/6' })
            .intersects(buffer).run((err, fc) => {
                document.getElementById('rivers').innerText = (fc?.features?.length || 0) + " segments";
                document.getElementById('rivers').classList.remove('loading');
            });

        // 3. Wetlands Query (FWS)
        L.esri.query({ url: 'https://fwspublicservices.wim.usgs.gov/wetlandsmapservice/rest/services/Wetlands/MapServer/0' })
            .intersects(buffer).run((err, fc) => {
                document.getElementById('wetlands').innerText = (fc?.features?.length || 0) + " areas";
                document.getElementById('wetlands').classList.remove('loading');
            });
    </script>
</body>
</html>
