<!DOCTYPE html>
<html>
<head>
    <title>Watershed Risk Assessment</title>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 40px; color: #1e293b; line-height: 1.5; }
        .report-card { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .risk-high { color: #dc2626; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .metric { border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; background: #f8fafc; }
        .label { font-size: 11px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; }
        .value { font-size: 20px; font-weight: bold; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .loading { animation: pulse 1.5s infinite; color: #2563eb; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="report-card">
    <h1 id="siteName">Site Risk Analysis</h1>
    <p id="subhead" style="color:#64748b; margin-top:-15px;"></p>

    <div class="grid">
        <div class="metric">
            <div class="label">Primary Water Utility</div>
            <div id="utility" class="value loading">Querying EPA...</div>
        </div>
        <div class="metric">
            <div class="label">Local Watershed Impact</div>
            <div id="rivers" class="value loading">Analyzing Streams...</div>
        </div>
        <div class="metric">
            <div class="label">Protected Wetlands</div>
            <div id="wetlands" class="value loading">Analyzing NWI...</div>
        </div>
        <div class="metric">
            <div class="label">Total Historic Consumption</div>
            <div id="totalUse" class="value">--</div>
        </div>
    </div>

    <h3>Year-by-Year Consumption Profile</h3>
    <table id="useTable">
        <thead><tr><th>Reporting Year</th><th>Gallons Withdrawn</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // 1. Get Data from URL
    const urlParams = new URLSearchParams(window.location.search);
    const rawData = urlParams.get('data');
    if (!rawData) { document.body.innerHTML = "No site data found."; }
    
    const d = JSON.parse(decodeURIComponent(rawData));
    document.getElementById('siteName').innerText = d.name;
    document.getElementById('subhead').innerText = `Operator: ${d.co} | Coordinates: ${d.lat.toFixed(4)}, ${d.lng.toFixed(4)}`;

    // 2. Populate Consumption Table
    let total = 0;
    const tbody = document.querySelector('#useTable tbody');
    Object.keys(d.yearly).sort().reverse().forEach(year => {
        const val = d.yearly[year];
        total += val;
        tbody.innerHTML += `<tr><td>${year}</td><td>${val.toLocaleString()} gal</td></tr>`;
    });
    document.getElementById('totalUse').innerText = total.toLocaleString() + " gal";

    // 3. Perform Spatial Risk Assessment
    const centerPoint = turf.point([d.lng, d.lat]);
    const riskZone = turf.buffer(centerPoint, 5, {units: 'miles'});

    // Query Water Utility (EPA)
    L.esri.query({ url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/Water_System_Boundaries/FeatureServer/0' })
        .intersects(riskZone).run((err, featureCollection) => {
            const el = document.getElementById('utility');
            el.classList.remove('loading');
            el.innerText = featureCollection?.features[0]?.properties?.NAME || "Private/Unknown System";
        });

    // Query Streams & Rivers (USGS NHD)
    L.esri.query({ url: 'https://hydro.nationalmap.gov/arcgis/rest/services/nhd/MapServer/6' })
        .intersects(riskZone).run((err, featureCollection) => {
            const el = document.getElementById('rivers');
            el.classList.remove('loading');
            const count = featureCollection?.features?.length || 0;
            el.innerHTML = `${count} <span style="font-size:12px; font-weight:normal;">Nearby Streams</span>`;
            if (count > 10) el.classList.add('risk-high');
        });

    // Query Wetlands (National Wetlands Inventory)
    L.esri.query({ url: 'https://fwspublicservices.wim.usgs.gov/wetlandsmapservice/rest/services/Wetlands/MapServer/0' })
        .intersects(riskZone).run((err, featureCollection) => {
            const el = document.getElementById('wetlands');
            el.classList.remove('loading');
            const count = featureCollection?.features?.length || 0;
            el.innerHTML = `${count} <span style="font-size:12px; font-weight:normal;">Mapped Wetlands</span>`;
        });
</script>

</body>
</html>
