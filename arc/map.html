<!DOCTYPE html>
<html>
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NXY7BHERXJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NXY7BHERXJ');
    </script>

    <meta charset="UTF-8">
    <title>Water Impact & Restoration Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        #map { height: 100vh; width: 100%; background: #0b1622; }
        
        #search-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 300px; }
        .leaflet-control-geocoder { box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-radius: 8px; border: none; width: 100%; }

        .stat-row { display: flex; justify-content: space-between; margin-top: 3px; }
        .stat-row span { color: #64748b; font-weight: 500; }
        .project-header { font-weight: bold; color: #10b981; margin-bottom: 5px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        
        /* Dark Mode Control Layers */
        .leaflet-control-layers { background: rgba(15, 23, 42, 0.9) !important; color: #fff !important; border: none !important; border-radius: 12px !important; padding: 10px !important; backdrop-filter: blur(8px); }
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
    </style>
</head>
<body>

<div id="search-container"></div>
<div id="map"></div>

<script>
    var map = L.map('map', { center: [38.9, -77.45], zoom: 10 });

    var streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var satelliteHybrid = L.esri.basemapLayer('ImageryHybrid');

    var dcMarkers = L.layerGroup().addTo(map);
    var offsetMarkers = L.layerGroup().addTo(map);

    // EPA Water Service Boundaries (Public Water Systems)
    var epaBoundaries = L.esri.featureLayer({
        url: 'https://services.arcgis.com/cJ9YHowT8TU7DUyn/arcgis/rest/services/SDWIS_Service_Areas_Public_View/FeatureServer/0',
        style: { color: '#3b82f6', weight: 1, fillOpacity: 0.1 }
    }).addTo(map);

    // Watersheds (HUC8)
    var huc8Layer = L.esri.featureLayer({
        url: 'https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/USA_Wetlands/FeatureServer/0',
        style: { color: '#10b981', weight: 1, fillOpacity: 0.05 }
    });

    // Rivers and Streams
    var riversLayer = L.esri.featureLayer({
        url: 'https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/USA_Rivers_and_Streams/FeatureServer/0',
        style: { color: '#60a5fa', weight: 1.5 }
    });

    var geocoder = L.Control.geocoder({ defaultMarkGeocode: false })
        .on('markgeocode', function(e) { map.fitBounds(e.geocode.bbox); })
        .addTo(map);
    document.getElementById('search-container').appendChild(geocoder.getContainer());

    function parseCSV(text) {
        const rows = [];
        const lines = text.trim().split(/\r?\n/);
        lines.forEach(line => {
            const values = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else current += char;
            }
            values.push(current.trim());
            rows.push(values);
        });
        return rows;
    }

    async function loadMapData() {
        const dcIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        const offsetIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        
        // 1. LOAD & AGGREGATE WATER USAGE FROM CSV
        try {
            const res = await fetch('wateruse.csv');
            const text = await res.text();
            const rows = parseCSV(text);
            const headers = rows[0];

            const idx = {
                company: headers.indexOf('Company'),
                location: headers.indexOf('Location'),
                date: headers.indexOf('Date'),
                gallons: headers.indexOf('Gallons'),
                lat: headers.indexOf('X'),
                lng: headers.indexOf('Y')
            };

            const locations = {};

            rows.slice(1).forEach(row => {
                const lat = parseFloat(row[idx.lat]);
                const lng = parseFloat(row[idx.lng]);
                if (isNaN(lat) || isNaN(lng)) return;

                const key = `${lat.toFixed(4)}|${lng.toFixed(4)}`;
                const gallons = parseFloat(row[idx.gallons]) || 0;
                
                // Extract Year
                const yearMatch = row[idx.date] ? row[idx.date].match(/\d{4}/) : null;
                const year = yearMatch ? yearMatch[0] : 'Unknown';

                if (!locations[key]) {
                    locations[key] = {
                        lat: lat, lng: lng,
                        name: row[idx.location],
                        company: row[idx.company],
                        total: 0,
                        yearly: {}
                    };
                }
                
                locations[key].total += gallons;
                locations[key].yearly[year] = (locations[key].yearly[year] || 0) + gallons;
            });

            Object.values(locations).forEach(loc => {
                let yearlyHtml = Object.entries(loc.yearly)
                    .sort((a, b) => b[0] - a[0])
                    .map(([yr, val]) => `<span>${yr}:</span> <strong>${val.toLocaleString()} gal</strong>`)
                    .join('<br>');

                L.marker([loc.lat, loc.lng], { icon: dcIcon })
                    .bindPopup(`
                        <div style="min-width:200px">
                            <strong style="font-size:14px;">${loc.name}</strong><br>
                            <span style="color:#64748b">${loc.company}</span><hr>
                            <div class="stat-row" style="display:block; font-size:12px;">
                                ${yearlyHtml}
                            </div>
                            <div style="margin-top:8px; border-top:1px solid #eee; padding-top:5px; font-weight:bold;">
                                Total: ${loc.total.toLocaleString()} gal
                            </div>
                        </div>
                    `)
                    .addTo(dcMarkers);
            });
        } catch (e) { console.error("Water Use Load Error:", e); }

        // 2. LOAD WATER PROJECTS FROM CSV
        try {
            const res = await fetch('wateroffsets.csv');
            const text = await res.text();
            const rows = parseCSV(text);
            const headers = rows[0];

            const idxOff = {
                company: headers.indexOf('Company'),
                project: headers.indexOf('Project Name'),
                lat: headers.indexOf('X'),
                lng: headers.indexOf('Y'),
                gallons: headers.indexOf('Gallons'),
                type: headers.indexOf('Project type'),
                cat: headers.indexOf('Project Category')
            };

            rows.slice(1).forEach(row => {
                const lat = parseFloat(row[idxOff.lat]);
                const lng = parseFloat(row[idxOff.lng]);
                
                if (!isNaN(lat) && !isNaN(lng)) {
                    const gal = row[idxOff.gallons] ? parseInt(row[idxOff.gallons].replace(/,/g, '')).toLocaleString() : '0';
                    L.marker([lat, lng], { icon: offsetIcon })
                        .bindPopup(`
                            <div class="project-header">Water Restoration Project</div>
                            <strong>${row[idxOff.project]}</strong><br>
                            <span style="color:#64748b">by ${row[idxOff.company]}</span><hr>
                            <div class="stat-row"><span>Type:</span><strong>${row[idxOff.type]}</strong></div>
                            <div class="stat-row" style="color:#10b981;"><span>Benefit:</span><strong>${gal} gal</strong></div>
                        `).addTo(offsetMarkers);
                }
            });
        } catch (e) { console.error("Offsets Load Error:", e); }
    }

    var baseLayers = { "Satellite": satelliteHybrid, "Street": streetMap };
    var overlays = {
        "Data Centers (Usage)": dcMarkers,
        "Water Projects (Restoration)": offsetMarkers,
        "Utility Service Areas": epaBoundaries,
        "Rivers & Streams": riversLayer,
        "Watersheds": huc8Layer
    };

    L.control.layers(baseLayers, overlays, { collapsed: false }).addTo(map);
    loadMapData();
</script>
</body>
</html>
