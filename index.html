
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Center Water Leaks</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {font-family:Arial;margin:25px;background:#f5f7fb;}
.container {display:flex;gap:25px;}
.sidebar {width:260px;background:white;padding:15px;border-radius:8px;height:620px;overflow:auto;}
.main {flex:1;background:white;padding:20px;border-radius:8px;}
#map {height:640px;margin-top:10px;border-radius:8px;}
.locationBtn{display:block;width:100%;margin-bottom:8px;padding:8px;background:#1976d2;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;}
.locationBtn:hover{background:#0f5aa6;}
.toolbar button{margin-right:10px;padding:8px 12px;cursor:pointer;}
.filters{margin-bottom:15px;}
table{border-collapse:collapse;width:100%;margin-top:20px;font-size:13px;}
th,td{border:1px solid #ccc;padding:6px;text-align:left;}
th{background:#f0f0f0;}
</style>
</head>

<body>

<h2>Data Center Water Leaks</h2>
<p>Units: gallons</p>

<div class="filters">
<label>Company:</label>
<select id="companyFilter" onchange="applyFilters()">
<option value="All">All</option>
<option value="Amazon">Amazon</option>
</select>

<label style="margin-left:20px;">Utility:</label>
<select id="utilityFilter" onchange="applyFilters()">
<option value="All">All</option>
<option value="Fairfax Water">Fairfax Water</option>
<option value="Prince William Water">Prince William Water</option>
</select>
</div>

<div class="toolbar">
<button onclick="downloadCSV()">Download Data</button>
<button onclick="downloadGraph()">Download Graph</button>
</div>

<div class="container">

<div class="sidebar">
<b>Click an Address to View Chart</b>
<div id="locations"></div>
</div>

<div class="main">

<canvas id="siteChart"></canvas>

<h3>Click Map to see Annual Water Use</h3>
<div id="map"></div>

<h3>Annual Water Use by Utility</h3>
<table id="utilityTable">
<thead>
<tr>
<th>Utility</th>
<th>Year</th>
<th>Total Gallons</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<script>

let allRecords=[]
let records=[]

let map=L.map('map').setView([38.84,-77.15],10)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let siteChart

async function loadExcel(){

const response = await fetch("wateruse.xlsx")
const data = await response.arrayBuffer()

const workbook = XLSX.read(data)
const sheet = workbook.Sheets[workbook.SheetNames[0]]
const json = XLSX.utils.sheet_to_json(sheet)

allRecords = json.map(r => {

let dateValue = r.Date

if (typeof dateValue === "number") {
const parsed = XLSX.SSF.parse_date_code(dateValue)
dateValue = new Date(parsed.y, parsed.m - 1, parsed.d)
} else {
dateValue = new Date(dateValue)
}

return {
company:r.Company,
utility:r.Utility,
location:String(r.Location).trim(),
date:dateValue.toISOString().split("T")[0],
year:dateValue.getFullYear(),
gallons:Number(r.Gallons)
}

})

records=[...allRecords]

buildMap()
loadLocations()
buildUtilityTable()

}

async function buildMap(){

map.eachLayer(layer=>{
if(layer instanceof L.Marker){
map.removeLayer(layer)
}
})

const grouped={}

allRecords.forEach(r=>{
if(!grouped[r.location]) grouped[r.location]={}
if(!grouped[r.location][r.year]) grouped[r.location][r.year]=0
grouped[r.location][r.year]+=r.gallons
})

const locations = Object.keys(grouped)

for(const loc of locations){

let coords = localStorage.getItem("geo_"+loc)

if(coords){
coords = JSON.parse(coords)
}else{

const url = "https://nominatim.openstreetmap.org/search?format=json&q=" +
encodeURIComponent(loc + " Virginia")

const res = await fetch(url)
const data = await res.json()

if(!data.length) continue

coords = {
lat: parseFloat(data[0].lat),
lon: parseFloat(data[0].lon)
}

localStorage.setItem("geo_"+loc, JSON.stringify(coords))

}

let popup="<b>"+loc+"</b><br><br>"
popup+="<b>Annual Water Use (gallons)</b><br>"

for(const year in grouped[loc]){
popup+=year+": "+grouped[loc][year].toLocaleString()+"<br>"
}

L.marker([coords.lat,coords.lon]).addTo(map).bindPopup(popup)

}

}

function buildUtilityTable(){

const totals={}

records.forEach(r=>{
if(!totals[r.utility]) totals[r.utility]={}
if(!totals[r.utility][r.year]) totals[r.utility][r.year]=0
totals[r.utility][r.year]+=r.gallons
})

const tbody=document.querySelector("#utilityTable tbody")
tbody.innerHTML=""

for(const util in totals){
for(const year in totals[util]){

let tr=document.createElement("tr")

let td1=document.createElement("td")
td1.innerText=util

let td2=document.createElement("td")
td2.innerText=year

let td3=document.createElement("td")
td3.innerText=totals[util][year].toLocaleString()

tr.appendChild(td1)
tr.appendChild(td2)
tr.appendChild(td3)

tbody.appendChild(tr)

}
}

}

function applyFilters(){

const company=document.getElementById("companyFilter").value
const utility=document.getElementById("utilityFilter").value

records=allRecords.filter(r=>
(company==="All"||r.company===company)&&
(utility==="All"||r.utility===utility)
)

document.getElementById("locations").innerHTML=""

loadLocations()
buildUtilityTable()

}

function uniqueLocations(){
return [...new Set(records.map(r=>r.location))]
}

function loadLocations(){

const sidebar=document.getElementById("locations")

uniqueLocations().forEach(loc=>{

let btn=document.createElement("button")
btn.className="locationBtn"
btn.innerText=loc
btn.onclick=()=>drawChart(loc)

sidebar.appendChild(btn)

})

}

function drawChart(location){

let data=records.filter(r=>r.location===location)
let labels=data.map(d=>d.date)
let values=data.map(d=>d.gallons)

if(siteChart) siteChart.destroy()

siteChart=new Chart(document.getElementById("siteChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:location+" gallons",
data:values,
fill:false
}]
}
})

}

function downloadCSV(){

let rows=["Company,Utility,Location,Date,Gallons"]

records.forEach(r=>{
rows.push(r.company+","+r.utility+","+r.location+","+r.date+","+r.gallons)
})

let blob=new Blob([rows.join("\n")],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="water_use_data.csv"
a.click()

}

function downloadGraph(){

if(!siteChart) return

let link=document.createElement("a")
link.href=siteChart.toBase64Image()
link.download="water_use_graph.png"
link.click()

}

loadExcel()

</script>

</body>
</html>
