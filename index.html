
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Water Use Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:25px;background:#f5f7fb;}
.container{display:flex;gap:20px;}
.sidebar{width:260px;background:white;padding:15px;border-radius:8px;height:620px;overflow:auto;}
.main{flex:1;background:white;padding:20px;border-radius:8px;}
#map{height:640px;margin-top:10px;border-radius:8px;}
.locationBtn{display:block;width:100%;margin-bottom:8px;padding:8px;background:#1976d2;color:white;border:none;border-radius:4px;cursor:pointer;font-size:13px;}
.locationBtn:hover{background:#0f5aa6;}
table{border-collapse:collapse;width:100%;margin-top:20px;font-size:13px;}
th,td{border:1px solid #ccc;padding:6px;}
th{background:#f0f0f0;}
.filters{margin-bottom:15px;}
.toolbar button{margin-right:10px;padding:8px 12px;cursor:pointer;}
</style>
</head>

<body>

<h2>Water Use Dashboard</h2>
<p>Units: gallons</p>

<div class="filters">
<label>Company:</label>
<select id="companyFilter" onchange="applyFilters()">
<option value="All">All</option>
</select>

<label style="margin-left:20px;">Utility:</label>
<select id="utilityFilter" onchange="applyFilters()">
<option value="All">All</option>
</select>
</div>

<div class="toolbar">

<button onclick="downloadExcel()">Download Excel</button>
</div>

<div class="container">

<div class="sidebar">
<b>Sites</b>
<div id="locations"></div>
</div>

<div class="main">

<canvas id="siteChart"></canvas>

<h3>Map</h3>
<div id="map"></div>

<h3>Annual Water Use by Utility</h3>
<table id="utilityTable">
<thead>
<tr>
<th>Utility</th>
<th>Year</th>
<th>Total Gallons</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<script>

let allRecords=[]
let records=[]

let map=L.map('map').setView([38.85,-77.35],9)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let siteChart

async function loadExcel(){

const response = await fetch("wateruse.xlsx")
const data = await response.arrayBuffer()

const workbook = XLSX.read(data)
const sheet = workbook.Sheets[workbook.SheetNames[0]]
const json = XLSX.utils.sheet_to_json(sheet)

allRecords = json.map(r=>{

let dateVal=r.Date

if(typeof dateVal==="number"){
const p=XLSX.SSF.parse_date_code(dateVal)
dateVal=new Date(p.y,p.m-1,p.d)
}else{
dateVal=new Date(dateVal)
}

return{
company:r.Company,
utility:r.Utility,
location:String(r.Location).trim(),
date:dateVal.toISOString().split("T")[0],
year:dateVal.getFullYear(),
gallons:Number(r.Gallons),
x:r.X,
y:r.Y
}

})

records=[...allRecords]

buildFilters()
loadLocations()
buildMap()
buildUtilityTable()

}

function buildFilters(){

const companySet=[...new Set(allRecords.map(r=>r.company))]
const utilitySet=[...new Set(allRecords.map(r=>r.utility))]

const companySel=document.getElementById("companyFilter")
const utilitySel=document.getElementById("utilityFilter")

companySet.forEach(c=>{
let opt=document.createElement("option")
opt.value=c
opt.text=c
companySel.appendChild(opt)
})

utilitySet.forEach(u=>{
let opt=document.createElement("option")
opt.value=u
opt.text=u
utilitySel.appendChild(opt)
})

}

function applyFilters(){

const c=document.getElementById("companyFilter").value
const u=document.getElementById("utilityFilter").value

records=allRecords.filter(r=>
(c==="All"||r.company===c)&&
(u==="All"||r.utility===u)
)

document.getElementById("locations").innerHTML=""
loadLocations()
buildUtilityTable()

}

function buildMap(){

const grouped={}

allRecords.forEach(r=>{
if(!grouped[r.location]) grouped[r.location]={}
if(!grouped[r.location][r.year]) grouped[r.location][r.year]=0
grouped[r.location][r.year]+=r.gallons
})

const locations=Object.keys(grouped)

locations.forEach(loc=>{

let rec=allRecords.find(r=>r.location===loc)

let lat=parseFloat(rec.y)
let lon=parseFloat(rec.x)

if(isNaN(lat)||isNaN(lon)) return

let popup="<b>"+loc+"</b><br><br>"

for(const yr in grouped[loc]){
popup+=yr+": "+grouped[loc][yr].toLocaleString()+" gallons<br>"
}

L.marker([lat,lon]).addTo(map).bindPopup(popup)

})

}

function buildUtilityTable(){

const totals={}

records.forEach(r=>{
if(!totals[r.utility]) totals[r.utility]={}
if(!totals[r.utility][r.year]) totals[r.utility][r.year]=0
totals[r.utility][r.year]+=r.gallons
})

const tbody=document.querySelector("#utilityTable tbody")
tbody.innerHTML=""

for(const util in totals){
for(const yr in totals[util]){

let tr=document.createElement("tr")
tr.innerHTML="<td>"+util+"</td><td>"+yr+"</td><td>"+totals[util][yr].toLocaleString()+"</td>"
tbody.appendChild(tr)

}
}

}

function uniqueLocations(){
return [...new Set(records.map(r=>r.location))]
}

function loadLocations(){

const sidebar=document.getElementById("locations")

uniqueLocations().forEach(loc=>{

let btn=document.createElement("button")
btn.className="locationBtn"
btn.innerText=loc
btn.onclick=()=>drawChart(loc)

sidebar.appendChild(btn)

})

}

function drawChart(location){

let data=records.filter(r=>r.location===location)
let labels=data.map(d=>d.date)
let values=data.map(d=>d.gallons)

if(siteChart) siteChart.destroy()

siteChart=new Chart(document.getElementById("siteChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
label:location+" gallons",
data:values,
fill:false
}]
}
})

}

function downloadCSV(){

let rows=["Company,Utility,Location,Date,Gallons"]

records.forEach(r=>{
rows.push(r.company+","+r.utility+","+r.location+","+r.date+","+r.gallons)
})

let blob=new Blob([rows.join("\n")],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="wateruse_export.csv"
a.click()

}

function downloadExcel(){
window.location="wateruse.xlsx"
}

loadExcel()

</script>

</body>
</html>
