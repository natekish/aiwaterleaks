
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Center Water Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js" defer></script>

<style>
body{font-family:Arial;margin:25px;background:#f5f7fb;}
.section{background:white;padding:20px;border-radius:8px;margin-bottom:20px;}
.container{display:flex;gap:20px;}
.sidebar{width:260px;background:white;padding:15px;border-radius:8px;height:640px;overflow:auto;}
.main{flex:1;background:white;padding:20px;border-radius:8px;}
.chartContainer{height:640px;}
canvas{height:640px !important;}
.locationBtn{display:block;width:100%;margin-bottom:8px;padding:8px;background:#1976d2;color:white;border:none;border-radius:4px;cursor:pointer;}
.toolbar button{margin-right:10px;padding:8px 12px;}
.filters{margin-bottom:15px;}
</style>
</head>

<body>

<h2>Data Center Water Dashboard</h2>

<div class="toolbar">
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="openMap()">View Map</button>
</div>

<div class="filters">
<label>Company:</label>
<select id="companyFilter"></select>

<label style="margin-left:20px;">Utility:</label>
<select id="utilityFilter"></select>
</div>

<div class="section">
<h3>Annual Water Use by Utility</h3>

<table id="utilityTable">
<thead>
<tr>
<th>Utility</th>
<th>Year</th>
<th>Total Gallons</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="container">

<div class="sidebar">
<b>Sites</b>
<div id="locations"></div>
</div>

<div class="main">
<div class="chartContainer">
<canvas id="siteChart"></canvas>
</div>
</div>

</div>

</body>
</html>
